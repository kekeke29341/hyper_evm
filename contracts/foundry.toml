[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# HyperEVM: Cancun hardfork without blobs (EIP-1559 enabled; priority fees burned)
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# HyperEVM RPC endpoints
# Testnet chain ID: 998 | Mainnet chain ID: 999 | Local Anvil: 31337
# Small block gas limit: 2M | Big block gas limit: 30M (enable via evmUserModify)
[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
hyperEVM_testnet = "https://rpc.hyperliquid-testnet.xyz/evm"
hyperEVM_testnet_alt = "https://rpcs.chain.link/hyperevm/testnet"
hyperEVM_mainnet = "https://rpc.hyperliquid.xyz/evm"

[etherscan]
hyperEVM_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api-testnet.purrsec.com/api" }
hyperEVM_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.purrsec.com/api" }

[profile.ci]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]
fuzz = { runs = 256 }
invariant = { runs = 64, depth = 15 }

[fmt]
line_length = 120
