# Daily harvest → Merkle Cashdrop (JST 07:00). Commits updated deployment JSON for Vercel.
# Manual: Actions → Hyperpool Daily Rewards → Run workflow
name: Hyperpool Daily Rewards

on:
  schedule:
    # 22:00 UTC = 07:00 JST (Asia/Tokyo, UTC+9)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      chain:
        description: HyperEVM chain ID
        type: choice
        options:
          - "998"
          - "999"
        default: "998"

concurrency:
  group: hyperpool-daily-${{ github.event.inputs.chain || vars.HYPERPOOL_CHAIN || '998' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-rewards:
    name: Daily rewards (chain ${{ github.event.inputs.chain || vars.HYPERPOOL_CHAIN || '998' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: hyperpool-${{ github.event.inputs.chain || vars.HYPERPOOL_CHAIN || '998' }}
    env:
      DEPLOYMENT_CHAIN: ${{ github.event.inputs.chain || vars.HYPERPOOL_CHAIN || '998' }}
      PRIVATE_KEY: ${{ secrets.HYPERPOOL_PRIVATE_KEY }}
      RPC_URL: ${{ vars.HYPERPOOL_RPC_URL }}
    steps:
      - uses: actions/checkout@b4ffde65f96336fa8845d2abf1aaebbd41bdc435
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@0a0048894711f7d55835cd04bfeafac1976a8eb1
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (viem for scripts)
        run: npm ci
        working-directory: frontend

      - name: Verify deployment is live
        run: |
          node -e "
          const d = require('./frontend/src/lib/contracts/deployments/${DEPLOYMENT_CHAIN}.json');
          const vault = d.hyperpoolVault || d.liquidityVault;
          if (d.deployed === false || !vault || vault === '0x0000000000000000000000000000000000000000') {
            console.error('Chain ' + process.env.DEPLOYMENT_CHAIN + ' is not deployed — skip or deploy contracts first.');
            process.exit(1);
          }
          console.log('Vault:', vault);
          "

      - name: Run daily-rewards.mjs
        run: node scripts/daily-rewards.mjs

      - name: Commit Cashdrop deployment JSON (triggers Vercel redeploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "contracts/deployments/${DEPLOYMENT_CHAIN}.json" \
                  "frontend/src/lib/contracts/deployments/${DEPLOYMENT_CHAIN}.json"
          if git diff --staged --quiet; then
            echo "No deployment JSON changes (likely pendingUserRewards was 0)."
            exit 0
          fi
          git commit -m "chore(cron): update Cashdrop merkle for chain ${DEPLOYMENT_CHAIN}"
          git push
