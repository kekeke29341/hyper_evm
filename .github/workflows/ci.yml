name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci

jobs:
  contracts:
    name: Foundry (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge build
        run: forge build --sizes

      - name: Forge test
        run: forge test -vvv

      - name: Forge fmt check (tests)
        run: forge fmt --check test/

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DEFAULT_CHAIN_ID: "31337"
          NEXT_PUBLIC_RPC_URL: http://127.0.0.1:8545
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_DEFAULT_CHAIN_ID: "31337"
          NEXT_PUBLIC_RPC_URL: http://127.0.0.1:8545
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder

  sync-abi:
    name: ABI sync check
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts and sync ABIs
        run: |
          cd contracts && forge build
          node scripts/sync-abi.mjs

      - name: Verify no uncommitted ABI changes
        run: |
          git diff --exit-code frontend/src/lib/contracts/abis/ frontend/src/lib/contracts/deployments/ \
            || (echo "Run 'node scripts/sync-abi.mjs' and commit updated ABIs" && exit 1)
