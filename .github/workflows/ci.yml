name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FOUNDRY_PROFILE: ci

jobs:
  contracts:
    name: Foundry (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@b4ffde65f96336fa8845d2abf1aaebbd41bdc435

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@ac3e9deec47b3129520584cdba09c448d0d7cbb2

      - name: Forge build
        run: forge build --sizes

      - name: Forge test
        run: forge test -vvv

      - name: Forge fmt check (tests)
        run: forge fmt --check test/

      - name: Branch coverage gate
        run: node ../scripts/check-coverage.mjs 17

  slither:
    name: Slither (static analysis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@b4ffde65f96336fa8845d2abf1aaebbd41bdc435
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@ac3e9deec47b3129520584cdba09c448d0d7cbb2

      - name: Setup Python
        uses: actions/setup-python@8e9f8adf09a2123d3d71c2121ceeadcd225ee5e0
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither
        run: slither . --config-file slither.config.json --fail-high

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@b4ffde65f96336fa8845d2abf1aaebbd41bdc435

      - name: Setup Node.js
        uses: actions/setup-node@0a0048894711f7d55835cd04bfeafac1976a8eb1
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DEFAULT_CHAIN_ID: "998"
          NEXT_PUBLIC_TESTNET_RPC: https://rpcs.chain.link/hyperevm/testnet
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@b4ffde65f96336fa8845d2abf1aaebbd41bdc435

      - name: Setup Node.js
        uses: actions/setup-node@0a0048894711f7d55835cd04bfeafac1976a8eb1
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_DEFAULT_CHAIN_ID: "998"
          NEXT_PUBLIC_TESTNET_RPC: https://rpcs.chain.link/hyperevm/testnet
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_ADMIN_ENABLED: "true"

      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          CI: "true"
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_ADMIN_ENABLED: "true"

      - name: Run Playwright wallet-mock tests
        run: npm run test:e2e:wallet:mock
        env:
          CI: "true"
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_ADMIN_ENABLED: "true"

  sync-abi:
    name: ABI sync check
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@b4ffde65f96336fa8845d2abf1aaebbd41bdc435

      - uses: actions/setup-node@0a0048894711f7d55835cd04bfeafac1976a8eb1
        with:
          node-version: "20"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@ac3e9deec47b3129520584cdba09c448d0d7cbb2

      - name: Build contracts and sync ABIs
        run: |
          cd contracts && forge build
          node scripts/sync-abi.mjs

      - name: Verify no uncommitted ABI changes
        run: |
          git diff --exit-code frontend/src/lib/contracts/abis/ frontend/src/lib/contracts/deployments/ \
            || (echo "Run 'node scripts/sync-abi.mjs' and commit updated ABIs" && exit 1)
